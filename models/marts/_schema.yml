version: 2

models:
  - name: fact_sales
    description: Table de faits - grain 1 ligne = 1 item vendu
    columns:
      - name: order_id
        description: Identifiant unique de la commande
        tests:
          - not_null
      - name: product_id
        description: Clé étrangère vers dim_products
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                column: product_id
      - name: store_id
        description: Clé étrangère vers dim_stores
        tests:
          - not_null
      - name: net_revenue
        description: Revenu net après remises
        tests:
          - not_null

  - name: dim_date
    description: Dimension temporelle (1 jour = 1 ligne)
    columns:
      - name: date_key
        description: Clé primaire YYYYMMDD
        tests:
          - unique
          - not_null

  - name: dim_products
    description: Dimension produit (1 produit = 1 ligne)
    columns:
      - name: product_id
        description: Clé primaire
        tests:
          - unique
          - not_null

  - name: dim_stores
    description: Dimension magasin (1 magasin = 1 ligne)
    columns:
      - name: store_id
        description: Clé primaire
        tests:
          - unique
          - not_null

  - name: dim_customers
    description: Dimension client avec métriques de comportement
    columns:
      - name: customer_id
        description: Clé primaire
        tests:
          - unique
          - not_null

  - name: mart_monthly_sales
    description: Agrégat mensuel par store × catégorie
    columns:
      - name: sales_month
        description: Premier jour du mois
        tests:
          - not_null