version: 2

models:
  - name: int_order_items_enriched
    description: Articles enrichis avec toutes les infos métier
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
      - name: net_revenue
        data_tests:
          - not_null

  - name: int_stocks_enriched
    description: Stocks enrichis avec infos produit/magasin
    columns:
      - name: store_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null